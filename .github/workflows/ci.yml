name: Teedy CI 流水线

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Maven 构建项目
        run: mvn clean package -DskipTests

      - name: 运行单元测试
        run: mvn test

      - name: PMD 代码质量检查
        run: mvn pmd:pmd

      - name: 生成测试报告
        run: mvn surefire-report:report

      - name: 生成 JavaDoc 文档
        run: mvn javadoc:javadoc

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: teedy-build-output
          path: |
            target/*.jar
            target/site/*
